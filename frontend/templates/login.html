{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 bg-navy-800">
  <!-- Background grid pattern -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-navy-600/30 via-navy-800 to-navy-800 pointer-events-none"></div>

  <div class="relative w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-accent/10 border border-accent/30 mb-4">
        <svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15M14.25 3.104c.251.023.501.05.75.082M19.8 15l-1.578 1.578a2.25 2.25 0 01-2.121.592c-1.042-.24-2.14-.372-3.267-.397m-3.567.397a2.25 2.25 0 01-1.91-.61L5 14.5m14.8.5l-1.578 1.578"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">PharmaRA</h1>
      <p class="text-slate-400 text-sm mt-1">Pharmaceutical Research Assistant</p>
    </div>

    <!-- Card -->
    <div class="bg-navy-700 rounded-2xl border border-navy-500 shadow-2xl p-8">
      <h2 class="text-lg font-semibold text-white mb-6">Sign in to your account</h2>

      {% if error %}
      <div class="mb-5 flex items-center gap-2.5 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
          <input
            type="text" id="username" name="username" required autocomplete="username"
            class="w-full px-3.5 py-2.5 bg-navy-800 border border-navy-500 rounded-lg text-white placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent/50 text-sm transition-colors"
            placeholder="Enter your username"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input
            type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full px-3.5 py-2.5 bg-navy-800 border border-navy-500 rounded-lg text-white placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent/50 text-sm transition-colors"
            placeholder="Enter your password"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2.5 px-4 bg-accent hover:bg-accent-dark text-navy-800 font-semibold text-sm rounded-lg
                 transition-colors focus:outline-none focus:ring-2 focus:ring-accent/50 focus:ring-offset-2 focus:ring-offset-navy-700"
        >
          Sign in
        </button>
      </form>
    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-slate-500 mt-6">
      Session expires when browser closes &middot; Internal tool only
    </p>
  </div>
</div>
{% endblock %}
